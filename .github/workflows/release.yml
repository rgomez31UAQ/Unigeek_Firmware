name: Build and Release

on:
  release:
    types: [created]
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - m5stickcplus_11
          - m5stickcplus_2
          - t_lora_pager
          - m5_cardputer
          - m5_cardputer_adv
          - t_display_16mb
          - t_display_s3_16mb
          # diy_smoochie excluded — not fully working

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'firmware/boards/**') }}
          restore-keys: pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        env:
          PLATFORMIO_BUILD_SRC_FLAGS: -DFIRMWARE_VERSION='"${{ github.ref_name }}"'
        run: pio run -e ${{ matrix.env }}

      - name: Rename binary
        run: cp unigeek-latest.bin unigeek-${{ matrix.env }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: unigeek-${{ matrix.env }}.bin
          retention-days: 7

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          files: unigeek-${{ matrix.env }}.bin

  build-website:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download firmware from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p website/public/firmware
          gh release download --repo ${{ github.repository }} --pattern "unigeek-*.bin" --dir website/public/firmware

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build website
        working-directory: website
        env:
          NEXT_PUBLIC_FIRMWARE_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy-pages:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
