[env:t_display_s3_16mb]
board = t_display_s3_16mb
board_build.partitions = firmware/partitions_16mb.csv

build_src_filter =${env.build_src_filter} +<../boards/t_display_s3_16mb>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/t_display_s3_16mb
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue

lib_deps =
	${env.lib_deps}
